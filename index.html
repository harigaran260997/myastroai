<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Vedic Astro AI Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            color: #e0e0e0;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 100vh;
            max-height: 90vh;
            background: rgba(20, 20, 40, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(138, 43, 226, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid rgba(138, 43, 226, 0.3);
        }

        .header {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.2) 0%, rgba(75, 0, 130, 0.2) 100%);
            padding: 20px;
            border-bottom: 2px solid rgba(138, 43, 226, 0.3);
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #a855f7, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 12px;
            color: #b0b0d0;
            margin: 5px 0 0 0;
        }

        .user-info {
            font-size: 12px;
            color: #a0a0d0;
            margin-top: 8px;
            display: none;
        }

        .user-info.active {
            display: block;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .form-container.hidden {
            display: none;
        }

        .form-content {
            background: rgba(50, 43, 99, 0.4);
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .form-content h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #d0a8ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 8px;
            background: rgba(20, 20, 40, 0.8);
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
            background: rgba(30, 30, 60, 0.9);
        }

        .form-group input::placeholder {
            color: #706080;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 30px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(168, 85, 247, 0.6);
        }

        .submit-btn.loading {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-container.hidden {
            display: none;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(138, 43, 226, 0.1);
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.4);
            border-radius: 10px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border-bottom-right-radius: 3px;
        }

        .message.ai .message-content {
            background: rgba(75, 0, 130, 0.3);
            color: #e0e0e0;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-bottom-left-radius: 3px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
            background: rgba(75, 0, 130, 0.3);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a855f7;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .input-area {
            padding: 15px 20px;
            border-top: 2px solid rgba(138, 43, 226, 0.3);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: rgba(20, 20, 40, 0.5);
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 8px;
            background: rgba(30, 30, 60, 0.8);
            color: #e0e0e0;
            font-size: 14px;
            resize: none;
            max-height: 100px;
            min-height: 45px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
        }

        .voice-btn {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 8px;
            background: rgba(30, 30, 60, 0.8);
            color: #a855f7;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-btn.active {
            background: rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(168, 85, 247, 0.1);
            }
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .container {
                max-height: 100vh;
                border-radius: 0;
            }

            .header h1 {
                font-size: 22px;
            }

            .message-content {
                max-width: 85%;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 18px;
            }

            .form-content {
                padding: 20px;
            }

            .message-content {
                max-width: 90%;
                font-size: 12px;
            }
        }

        .error-message {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 Vedic Astro AI</h1>
            <p>Your Cosmic Guide Through the Stars</p>
            <div class="user-info" id="userInfo"></div>
        </div>

        <div class="form-container" id="formContainer">
            <div class="form-content">
                <h2>✨ Begin Your Journey</h2>
                <form id="userDetailsForm">
                    <div class="form-group">
                        <label for="userName">Full Name</label>
                        <input type="text" id="userName" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="userDOB">Date of Birth</label>
                        <input type="text" id="userDOB" placeholder="DD/MM/YYYY" required>
                    </div>
                    <div class="form-group">
                        <label for="userTOB">Time of Birth</label>
                        <input type="text" id="userTOB" placeholder="HH:MM (24-hour format)" required>
                    </div>
                    <div class="form-group">
                        <label for="userPOB">Place of Birth</label>
                        <input type="text" id="userPOB" placeholder="City or Location" required>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">Unlock Your Chart 🔓</button>
                    <div class="error-message" id="formError"></div>
                </form>
            </div>
        </div>

        <div class="chat-container hidden" id="chatContainer">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="voice-btn" id="voiceBtn" title="Voice Input">🎤</button>
                    <textarea class="input-field" id="inputField" placeholder="Ask your astrological questions..." rows="1"></textarea>
                </div>
                <button class="send-btn" id="sendBtn" title="Send Message">🔮</button>
            </div>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6J12wV-70g0J0pv4S7jUYj5J4QpJRXGDMruVTx0b6EbLQ";
        const VEDIC_API_KEY = "1b71ac1f-677a-546d-957e-f600a81bfede";

        let state = {
            userDetails: null,
            chatHistory: [],
            isLoadingResponse: false
        };

        const formContainer = document.getElementById('formContainer');
        const chatContainer = document.getElementById('chatContainer');
        const userDetailsForm = document.getElementById('userDetailsForm');
        const submitBtn = document.getElementById('submitBtn');
        const formError = document.getElementById('formError');
        const userInfo = document.getElementById('userInfo');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const messagesContainer = document.getElementById('messages');

        userDetailsForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            formError.textContent = '';

            const name = document.getElementById('userName').value.trim();
            const dob = document.getElementById('userDOB').value.trim();
            const tob = document.getElementById('userTOB').value.trim();
            const pob = document.getElementById('userPOB').value.trim();

            if (!name || !dob || !tob || !pob) {
                formError.textContent = '❌ Please fill all fields';
                return;
            }

            if (!/^\d{2}\/\d{2}\/\d{4}$/.test(dob)) {
                formError.textContent = '❌ DOB must be in DD/MM/YYYY format';
                return;
            }

            if (!/^\d{2}:\d{2}$/.test(tob)) {
                formError.textContent = '❌ TOB must be in HH:MM format (24-hour)';
                return;
            }

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                state.userDetails = { name, dob, tob, pob };
                const currentDate = new Date(2026, 5, 20);
                const transitDate = currentDate.toLocaleDateString('en-GB', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });

                userInfo.textContent = `📅 ${name} • 🌍 ${pob} • ✨ Transits for ${transitDate}`;
                userInfo.classList.add('active');

                formContainer.classList.add('hidden');
                chatContainer.classList.remove('hidden');
                await initiateChatWithAI(name, dob, tob, pob, transitDate);
            } catch (error) {
                console.error('Error:', error);
                formError.textContent = '❌ An error occurred. Please try again.';
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
        });

        async function sendMessage() {
            const message = inputField.value.trim();
            if (!message || state.isLoadingResponse) return;

            state.chatHistory.push({ role: 'user', content: message });
            addMessageToUI('user', message);

            inputField.value = '';
            inputField.style.height = 'auto';
            sendBtn.disabled = true;
            state.isLoadingResponse = true;

            try {
                showTypingIndicator();
                const aiResponse = await getAIResponse(message);
                removeTypingIndicator();
                state.chatHistory.push({ role: 'assistant', content: aiResponse });
                addMessageToUI('ai', aiResponse);
                speakResponse(aiResponse);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessageToUI('ai', '❌ Unable to get a response. Please try again.');
            } finally {
                sendBtn.disabled = false;
                state.isLoadingResponse = false;
                inputField.focus();
            }
        }

        async function initiateChatWithAI(name, dob, tob, pob, transitDate) {
            try {
                showTypingIndicator();
                const welcomeMessage = `Welcome, ${name}! 🙏\n\nI sense the cosmic energy surrounding your birth on ${dob} at ${tob} in ${pob}. The universe has guided you here at this auspicious moment on ${transitDate}.\n\nI am your Vedic Astro Guide, versed in the ancient wisdom of Jyotisha. Through the lens of your birth chart and current planetary transits, we shall explore your destiny, karmic patterns, and the guidance the cosmos offers.\n\nWhat cosmic wisdom do you seek today?`;
                state.chatHistory.push({ role: 'assistant', content: welcomeMessage });
                removeTypingIndicator();
                addMessageToUI('ai', welcomeMessage);
                speakResponse(welcomeMessage);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (error) {
                console.error('Error:', error);
                removeTypingIndicator();
                addMessageToUI('ai', '❌ Error initializing chat. Please refresh and try again.');
            }
        }

        async function getAIResponse(userMessage) {
            const payload = {
                contents: state.chatHistory.map(msg => ({
                    parts: [{ text: msg.content }]
                })).concat([{
                    parts: [{ text: userMessage }]
                }]),
                systemInstruction: {
                    parts: [{ text: "You are an expert Vedic Astrologer specializing in Krishnamurti Paddhati (KP) astrology. Be warm, wise, and provide practical guidance." }]
                },
                generationConfig: {
                    temperature: 0.9,
                    maxOutputTokens: 1024
                }
            };

            const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }
            );

            if (!response.ok) throw new Error(`API Error: ${response.status}`);

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        function addMessageToUI(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';
            messageDiv.id = 'typingIndicator';
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'typing-indicator';
            indicatorDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            messageDiv.appendChild(indicatorDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function speakResponse(text) {
            const plainText = text.replace(/<[^>]*>/g, '');
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(plainText);
            utterance.lang = 'ta-IN';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ta-IN';
            recognition.onstart = () => voiceBtn.classList.add('active');
            recognition.onend = () => voiceBtn.classList.remove('active');
            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                if (transcript) {
                    inputField.value = transcript;
                    inputField.style.height = 'auto';
                    inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
                }
            };
        }

        voiceBtn.addEventListener('click', () => {
            if (!recognition) {
                alert('Speech Recognition not supported');
                return;
            }
            recognition.start();
        });

        window.addEventListener('load', () => inputField.focus());
    </script>
</body>
</html>
